server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # The app uses hash-based routing (#/...), so every real path just serves
    # the single index.html — no server-side rewrite rules are needed.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The service worker file must always be revalidated so PWA updates land
    # promptly instead of being stuck behind a stale cached copy.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
